name: runa
description: A block-based document editor for Linux, macOS, and Windows.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Value objects & serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # File system & platform dialogs
  path_provider: ^2.1.4
  path: ^1.9.0
  file_picker: ^10.3.10
  share_plus: ^10.0.0

  # Markdown rendering
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.0.0

  # Utilities
  uuid: ^4.5.1
  pdfrx: ^2.2.24
  flutter_math_fork: ^0.7.2

  # PDF generation
  pdf: ^3.10.0

  # Syntax highlighting
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
